<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Paranoia Duel</title>
	<link rel="icon" href="skull.png" type="image/png"> 
	<style>
		html,
		body {
		  height: 100%;
		  user-select: none;
		}
		body {
		  font-family: monospace, sans;
		  text-align: center;
		  overflow: hidden;
		  background-color: lightgrey;
		  transition:6s;
		}
		table {
		  width: 500px;
		  margin-left: auto;
		  margin-right: auto;
		}
		table,
		th,
		td {
		  padding: 10px;
		  border: 1px solid grey;
		  border-collapse: collapse;
		}
		svg {
		  width: 500px;
		  height: 500px;
		  border: 1px solid black;
		}
		#tdp1 {
		  background-color: lightgrey;
		  font-weight: bold;
		  font-size: 20px;
		  color: royalblue;
		}
		#tdp2 {
		  background-color: lightgrey;
		  font-weight: bold;
		  font-size: 20px;
		  color: crimson;
		}
		#skull {
		  transition: 0.5s;
		}
		#sk {
		  transition: 0.25s;
		}
		#bp1 {
		  opacity: 1;
		  transition: 1s;
		}
		#bp2 {
		  opacity: 0.25;
		  transition: 1s;
		}
		#g1, #g2, #c1, #c2 {
		  transition-timing-function: linear;
		  transition: 2s;
		}
		#tdi1 {
		  transition: 1s;
		}
		#tdi2 {
		  transition: 1s;
		}
		#gstart {
		  transition: 3s;
		}
		#txtdou {
		  transition: 0.5s;
		}
		#txtdead {
		  transition: 0.5s;
		}
		#txtwarp {
		  transition: 0.5s;
		}
		#txtwin {
		  transition: 0.5s;
		}
		#txtportal {
		  transition: 0.5s;
		}
		#iback {
		  transition: 3s;
		}
		#txtbomb, #txtgift, #txtcurse, #txtvortex {
		  transition: 0.5s;
		}
		.pointer {
		  cursor: pointer;
		}
		button {
		  font-family: consolas;
		  width: 50px;
		  height: 50px;
		}
		td {
		  background-color: lightgrey;
		  visibility: hidden;
		  opacity: 0;
		  transition: 3s;
		}
		#div1{
		width:25%;
		font-size:0.8em;
		opacity:1;
		visibility:visible;
		text-align:left;
		position:fixed;
		left: 8px;
		top: 8px;
		transition: 3s;
		}
		#div2{
		width:25%;
		font-size:1em;
		opacity:1;
		visibility:visible;
		text-align:right;
		position:fixed;
		right: 8px;
		top: 8px;
		transition: 3s;
		}
		#hid{
		opacity:0;
		transition:1s;
		}
		#hid:hover{
		opacity:1;
		}
		.shop-btn {
		  font-family: consolas;
		  font-size: 0.75em;
		  width: auto;
		  height: auto;
		  padding: 3px 6px;
		  margin: 2px;
		  cursor: pointer;
		  background: #222;
		  color: #ccc;
		  border: 1px solid #555;
		  border-radius: 3px;
		  display: inline-block;
		}
		.shop-btn:disabled {
		  opacity: 0.3;
		  cursor: not-allowed;
		}
		.shop-btn.owned {
		  border-color: gold;
		  color: gold;
		}
	</style>
</head>

				</circle>

function randomTilePos(exclude) {
    exclude = exclude || [];
    var pos;
    var forbidden = ["50 50", "80 90", "10 10", "90 90"];

    } while (
        exclude.indexOf(pos) !== -1 ||
        forbidden.indexOf(coor[pos]) !== -1
    );
    return pos;
}

// ─────────────────────────────────────────────────
//  CORE: resolvePosition(player, endFn)
//  Called every time a player lands somewhere.
//  Checks ALL tile effects in priority order,
//  then recursively re-resolves if position changed
//  (enabling full combos: bomb→death, bomb→portal…)
// ─────────────────────────────────────────────────
var RESOLVE_DEPTH_LIMIT = 6; // safety cap against infinite combos

function resolvePosition(player, endFn, depth) {
    depth = depth || 0;
    if (depth >= RESOLVE_DEPTH_LIMIT) { endFn(); return; }

    var pos = (player === 1) ? positionp1 : positionp2;

    // 1. DEATH — absolute priority, cancels everything else
    if (coor_death[pos_death] === coor[pos]) {
        // Cancel any active buffs — dying resets them
        if (player === 1) { p1_d10 = false; p1_turbo = false; p1_shield = false; }
        else              { p2_d10 = false; p2_turbo = false; p2_shield = false; }
        // Shield absorbs death instead
        var hasShield = (player === 1) ? p1_shield_active : p2_shield_active;
        if (hasShield) {
            if (player === 1) { p1_shield_active = false; }
            else              { p2_shield_active = false; }
            rules.innerHTML = "🛡️ Amulette ! " + (player===1 ? divp1 : divp2).innerHTML + " survit à la mort !";
            audio_bonus.play();
            setTimeout(function() { endFn(); }, 1500);
            updateShop();
            return;
        }
        if (player === 1) deadp1(); else deadp2();
        return;
    }

    // 2. WIN
    if (pos >= 80) {
        if (player === 1) p1win(); else p2win();
        return;
    }

    // 3. GOLD BONUS (play again)
    var onBonus = (pos === posb1 || pos === posb2 || pos === posb3 || pos === posb4 || pos === posb5);
    if (onBonus) {
        if (player === 1) doublep1(); else doublep2();
        return;
    }

    // 4. SWAP squares (green dots at "50 50" and "80 90")
    var posCoord = coor[pos];
    if (posCoord === "50 50" || posCoord === "80 90") {
        xch();
        endFn();
        return;
    }

    // 5. PORTAL
    var portalHit = false;
    if (posCoord === coor[blue_pos]) {
        if (player === 1) { positionp1 = orange_pos; } else { positionp2 = orange_pos; }
        portalHit = true;
    } else if (posCoord === coor[orange_pos]) {
        if (player === 1) { positionp1 = blue_pos; } else { positionp2 = blue_pos; }
        portalHit = true;
    }
    if (portalHit) {
        showNotif(txtportal, 0, 1800);
        audio_portal.play();
        movePlayer(player);
        setTimeout(function() { resolvePosition(player, endFn, depth + 1); }, 2000);
        return;
    }

    // 6. 💣 BOMB (built-in + shop-placed)
    var bombHit = false, bombEl = null;
    if (pos === posBomb1) { bombEl = bomb1_el; posBomb1 = -1; bombHit = true; }
    else if (pos === posBomb2) { bombEl = bomb2_el; posBomb2 = -1; bombHit = true; }
    else if (checkShopBombs(pos)) { bombHit = true; bombEl = null; } // shop bomb already removed
    if (bombHit) {
        var rollback = Math.floor(Math.random() * 6) + 1;
        showNotif(txtbomb, 0, 1600);
        if (bombEl) removeTile(bombEl);
        setTimeout(function() {
            if (player === 1) {
                positionp1 = Math.max(0, positionp1 - rollback);
                rules.innerHTML = "💣 BOOM ! " + divp1.innerHTML + " recule de " + rollback + " cases !";
            } else {
                positionp2 = Math.max(0, positionp2 - rollback);
                rules.innerHTML = "💣 BOOM ! " + divp2.innerHTML + " recule de " + rollback + " cases !";
            }
            movePlayer(player);
            setTimeout(function() { resolvePosition(player, endFn, depth + 1); }, 1200);
        }, 700);
        return;
    }

    // 7. 🪤 TRAP — foe goes back 1D6, check if foe dies
    if (pos === posCurse) {
        removeTile(curse_el);
        posCurse = -1;
        var trapRoll = Math.floor(Math.random() * 6) + 1;
        showNotif(txtcurse, 0, 1600);
        var foe = (player === 1) ? 2 : 1;
        setTimeout(function() {
            if (foe === 1) {
                positionp1 = Math.max(0, positionp1 - trapRoll);
                rules.innerHTML = "🪤 Piège ! " + divp1.innerHTML + " recule de " + trapRoll + " cases !";
                movePlayer(1);
            } else {
                positionp2 = Math.max(0, positionp2 - trapRoll);
                rules.innerHTML = "🪤 Piège ! " + divp2.innerHTML + " recule de " + trapRoll + " cases !";
                movePlayer(2);
            }
            // Check if foe landed on death
            setTimeout(function() {
                var foePos = (foe === 1) ? positionp1 : positionp2;
                if (coor_death[pos_death] === coor[foePos]) {
                    if (foe === 1) deadp1(); else deadp2();
                    setTimeout(endFn, 1800);
                } else {
                    endFn();
                }
            }, 1000);
        }, 700);
        return;
    }

    // 8. 🎁 GIFT (next roll 1D10)
    if (pos === posGift) {
        removeTile(gift_el);
        posGift = -1;
        showNotif(txtgift, 0, 1600);
        if (player === 1) { p1_d10 = true; rules.innerHTML = "🎁 " + divp1.innerHTML + " a un cadeau ! Prochain lancer : 1D10 !"; }
        else              { p2_d10 = true; rules.innerHTML = "🎁 " + divp2.innerHTML + " a un cadeau ! Prochain lancer : 1D10 !"; }
        setTimeout(endFn, 1800);
        return;
    }

    // 9. 🌀 VORTEX
    if (pos === posVortex) {
        removeTile(vortex_el);
        posVortex = -1;
        showNotif(txtvortex, 0, 1800);
        setTimeout(function() {
            positionp1 = Math.floor(Math.random() * 70) + 1;
            positionp2 = Math.floor(Math.random() * 70) + 1;
            g1.setAttribute("transform", "translate(" + coor[positionp1] + ")");
            g2.setAttribute("transform", "translate(" + coor[positionp2] + ")");
            pos1.innerHTML = positionp1 + "/" + (coor.length - 1);
            pos2.innerHTML = positionp2 + "/" + (coor.length - 1);
            rules.innerHTML = "🌀 VORTEX ! Tout le monde est éparpillé !";
            audio_warp.play();
            state();
            setTimeout(function() { resolvePosition(player, endFn, depth + 1); }, 1200);
        }, 1000);
        return;
    }

    // 10. Nothing special
    state();
    endFn();
}

var SHOP_PRICES = { shield: 15, turbo: 10, bomb: 20 };

function updateShop() {
    var shop1 = document.getElementById("shop1");
    var shop2 = document.getElementById("shop2");
    if (!shop1 || !shop2) return;

    function makeBtn(label, cost, owned, disabled, onclick) {
        var cls = "shop-btn" + (owned ? " owned" : "");
        var dis = disabled ? " disabled" : "";
        var title = owned ? "✓ actif" : (cost + "💰");
        return '<button class="' + cls + '"' + dis + ' onclick="' + onclick + '">' + label + ' ' + title + '</button>';
    }

    // Player 1 shop (only shown when it's p1's turn — bp1 active)
    var p1Active = (bp1.style.opacity !== "0.25");
    shop1.innerHTML =
        makeBtn("🛡️", SHOP_PRICES.shield, p1_shield_active, (!p1Active || p1_shield_active || money1 < SHOP_PRICES.shield), "buyShield(1)") +
        makeBtn("⚡", SHOP_PRICES.turbo,  p1_turbo,         (!p1Active || p1_turbo  || money1 < SHOP_PRICES.turbo),  "buyTurbo(1)")  +
        makeBtn("💣", SHOP_PRICES.bomb,   false,             (!p1Active || money1 < SHOP_PRICES.bomb),                  "buyBomb(1)");

    // Player 2 shop
    var p2Active = (bp2.style.opacity !== "0.25");
    shop2.innerHTML =
        makeBtn("🛡️", SHOP_PRICES.shield, p2_shield_active, (!p2Active || p2_shield_active || money2 < SHOP_PRICES.shield), "buyShield(2)") +
        makeBtn("⚡", SHOP_PRICES.turbo,  p2_turbo,         (!p2Active || p2_turbo  || money2 < SHOP_PRICES.turbo),  "buyTurbo(2)")  +
        makeBtn("💣", SHOP_PRICES.bomb,   false,             (!p2Active || money2 < SHOP_PRICES.bomb),                  "buyBomb(2)");
}

// Extra SVG bombs for shop-placed bombs
var shopBombs = []; // array of {el, pos}
function createShopBomb(pos) {
    var ns = "http://www.w3.org/2000/svg";
    var g = document.createElementNS(ns, "g");
    g.setAttribute("transform", "translate(" + coor[pos] + ")");
    var c = document.createElementNS(ns, "circle");
    c.setAttribute("cx", "0"); c.setAttribute("cy", "0");
    c.setAttribute("r", "1.2"); c.setAttribute("fill", "crimson");
    var a1 = document.createElementNS(ns, "animate");
    a1.setAttribute("attributeName", "r"); a1.setAttribute("values", "1.2;1.8;1.2");
    a1.setAttribute("dur", "0.6s"); a1.setAttribute("repeatCount", "indefinite");
    var a2 = document.createElementNS(ns, "animate");
    a2.setAttribute("attributeName", "opacity"); a2.setAttribute("values", "1;0.4;1");
    a2.setAttribute("dur", "0.6s"); a2.setAttribute("repeatCount", "indefinite");
    c.appendChild(a1); c.appendChild(a2); g.appendChild(c);
    svgEl.appendChild(g);
    shopBombs.push({ el: g, pos: pos });
}

svgEl.addEventListener("click", function(e) {
    if (!placingBomb) return;
    var rect = svgEl.getBoundingClientRect();
    var svgW = rect.width, svgH = rect.height;
    var x = ((e.clientX - rect.left) / svgW) * 100;
    var y = ((e.clientY - rect.top) / svgH) * 100;
    // Snap to nearest grid point (grid is 10 10 to 90 90 in steps of 10)
    var gx = Math.round(x / 10) * 10;
    var gy = Math.round(y / 10) * 10;
    gx = Math.max(10, Math.min(90, gx));
    gy = Math.max(10, Math.min(90, gy));
    var coord = gx + " " + gy;
    // Forbid finish line
    if (coord === "90 90" || coord === "80 90") {
        rules.innerHTML = "⛔ Interdit de poser une bombe sur l\'arrivée !";
        return;
    }
    // Find index of this coord
    var idx = coor.indexOf(coord);
    if (idx < 0) { rules.innerHTML = "⛔ Case invalide !"; return; }
    createShopBomb(idx);
    rules.innerHTML = "💣 Bombe posée en " + coord + " !";
    svgEl.style.cursor = "";
    placingBomb = 0;
    updateShop();
});

// Check shop bombs in resolvePosition — inject into existing bomb check
// We extend the bomb check via shopBombs array
function checkShopBombs(pos) {
    for (var i = 0; i < shopBombs.length; i++) {
        if (shopBombs[i].pos === pos) {
            var el = shopBombs[i].el;
            shopBombs.splice(i, 1);
            removeTile(el);
            return true;
        }
    }
    return false;
}

}

function death_move() {
    sk.setAttribute("font-size", "10px");
    setTimeout(function() {
        sk.setAttribute("font-size", "5px");
    }, 500);
    audio_death.play();
    if (positionp1 > positionp2) {
        first = positionp1;
    } else {
        first = positionp2;
    }
    pos_death = first + Math.round(Math.random() * 6);
    while (coor_death[pos_death] === "50 50") {
        pos_death = first + Math.round(Math.random() * 6);
    }
    if (pos_death > 76) {
        pos_death = 75;
    }
    skull.setAttribute("transform", "translate(" + coor_death[pos_death] + ")");
}

function xch() {
    txtwarp.setAttribute("transform", "translate(100 0)");
    setTimeout(function() {
        txtwarp.setAttribute("transform", "translate(0 0)");
        audio_warp.play();
        [positionp1, positionp2] = [positionp2, positionp1];
        g1.setAttribute("transform", "translate(" + coor[positionp1] +
            ")");
        pos1.innerHTML = positionp1 + "/" + (coor.length - 1);
        g2.setAttribute("transform", "translate(" + coor[positionp2] +
            ")");
        pos2.innerHTML = positionp2 + "/" + (coor.length - 1);
    }, 2000);
}
